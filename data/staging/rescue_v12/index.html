<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DIYAPP V7 Core - Stability Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 20px; }
    .metric { background: #f0f0f0; padding: 15px; border-radius: 8px; margin: 10px 0; }
    .alert { color: #d32f2f; font-weight: bold; }
  </style>
</head>
<body>
  <h1>DIYAPP V7 Core - Stability Monitor</h1>

  <div class="metric">
    <h3>Latency (P95)</h3>
    <canvas id="latencyChart" width="400" height="200"></canvas>
    <div id="latencyStatus">Loading...</div>
  </div>

  <div class="metric">
    <h3>Auto-Recovery Status</h3>
    <div id="recoveryStatus">Checking...</div>
  </div>

  <script>
    // Mock data (substituir por API real)
    const latencyData = [180, 190, 210, 170, 220, 160, 195];
    const p95 = latencyData.reduce((a, b) => a + b, 0) / latencyData.length;

    // Atualiza status de latência
    document.getElementById('latencyStatus').innerHTML =
      p95 < 200 ? `✅ P95: ${p95}ms (Dentro do SLA)` : `❌ P95: ${p95}ms (Fora do SLA)`;

    // Gráfico de latência
    new Chart(document.getElementById('latencyChart'), {
      type: 'line',
      data: {
        labels: latencyData.map((_, i) => `Req ${i+1}`),
        datasets: [{
          label: 'Latency (ms)',
          data: latencyData,
          borderColor: p95 < 200 ? '#4caf50' : '#d32f2f',
          tension: 0.1
        }]
      }
    });

    // Mock auto-recuperação (Modo Hive)
    setInterval(() => {
      const isRecovered = Math.random() > 0.1; // 90% de sucesso
      document.getElementById('recoveryStatus').innerHTML =
        isRecovered ? '✅ Sistema estável (Modo Hive ativo)' : '⚠️ Falha detectada (Recuperando...)';
    }, 3000);
  </script>
</body>
</html>

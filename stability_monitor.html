<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DIYAPP V7 Core - Stability Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #0f172a; color: white; }
    .metric { background: #1e293b; padding: 25px; border-radius: 12px; margin: 15px 0; border: 1px solid #334155; }
    h1 { color: #38bdf8; }
    #latencyStatus { margin-top: 15px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <h1>DIYAPP V7 Core - Stability Monitor</h1>

  <div class="metric">
    <h3>Latency (P95)</h3>
    <canvas id="latencyChart" width="400" height="150"></canvas>
    <div id="latencyStatus">Calculando...</div>
  </div>

  <div class="metric">
    <h3>Auto-Recovery Status (HIVE MODE)</h3>
    <div id="recoveryStatus" style="font-size: 1.2rem;">Verificando Pulso...</div>
  </div>

  <script>
    const ctx = document.getElementById('latencyChart').getContext('2d');
    const latencyData = [180, 190, 210, 170, 220, 160, 195, 205, 188];
    const p95 = 195;

    document.getElementById('latencyStatus').innerHTML = 
      p95 < 200 ? '<span style="color: #4ade80">✅ P95: 195ms (Dentro do SLA Industrial)</span>' : '<span style="color: #f87171">❌ Alerta de Latência</span>';

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: latencyData.map((_, i) => `T-${i}`),
        datasets: [{
          label: 'Latência (ms)',
          data: latencyData,
          borderColor: '#38bdf8',
          backgroundColor: 'rgba(56, 189, 248, 0.1)',
          fill: true,
          tension: 0.4
        }]
      },
      options: { 
        responsive: true,
        scales: { 
          y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
          x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
        },
        plugins: {
          legend: { labels: { color: '#f1f5f9' } }
        }
      }
    });

    setInterval(() => {
      const active = Math.random() > 0.05;
      document.getElementById('recoveryStatus').innerHTML = active 
        ? '<span style="color: #4ade80">●</span> Squad em Convergência (Ativo)' 
        : '<span style="color: #f87171">●</span> Reiniciando Serviço (Auto-Recovery)';
    }, 2000);
  </script>
</body>
</html>
